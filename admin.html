<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow">
<title>Admin - Montauk The App</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-red:#B0342B;
    --red-ink:#9A2B22;
    --red-wash:#F7E7E4;
    --bg:#FBFAF7;
    --surface:#FFFFFF;
    --ink:#1F1D1B;
    --muted:#6E685F;
    --faint:#9A948B;
    --line:#E7E2D8;
    --free-ink:#2F6B34;    --free-bg:#E6F0E1;
    --ticket-ink:#8A5A00;  --ticket-bg:#F6ECD6;
    --review-ink:#7A736A;  --review-bg:#EFEBE3;
    --r-card:12px; --r-chip:999px; --r-tag:6px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);padding:0 0 48px}
  header{padding:22px 20px 12px;text-align:center;border-bottom:1px solid var(--line)}
  .mark-sub{font-family:"Anton",sans-serif;font-size:15px;line-height:1;
    letter-spacing:0.3em;text-indent:0.3em;text-transform:uppercase;color:var(--brand-red)}
  .h1{font-family:"Anton",sans-serif;font-size:30px;line-height:1;text-transform:uppercase;
    color:var(--brand-red);margin:6px 0 0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
  .count{font-family:"Oswald",sans-serif;font-size:14px;font-weight:600;letter-spacing:0.04em;
    text-transform:uppercase;color:var(--ink)}
  .msg{padding:40px 20px;text-align:center;color:var(--muted);font-size:15px;line-height:1.5}

  /* tab bar */
  .tabs{display:flex;border-bottom:1px solid var(--line);background:var(--surface);
    position:sticky;top:0;z-index:10}
  .tab{flex:1;appearance:none;border:0;background:none;cursor:pointer;font:inherit;
    font-family:"Oswald",sans-serif;font-size:13px;font-weight:600;letter-spacing:0.04em;
    text-transform:uppercase;color:var(--muted);padding:14px 6px 12px;border-bottom:2px solid transparent}
  .tab .n{display:inline-block;min-width:20px;margin-left:5px;font-size:11px;font-weight:600;
    padding:1px 6px;border-radius:999px;background:var(--line);color:var(--ink)}
  .tab[aria-selected="true"]{color:var(--brand-red);border-bottom-color:var(--brand-red)}
  .tab[aria-selected="true"] .n{background:var(--red-wash);color:var(--red-ink)}

  /* buttons */
  .btn{font:inherit;font-size:14px;font-weight:600;border-radius:999px;padding:9px 16px;
    min-height:44px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink)}
  .btn.primary{background:var(--brand-red);border-color:var(--brand-red);color:#fff}
  .btn.approve{background:var(--free-bg);border-color:var(--free-bg);color:var(--free-ink)}
  .btn.reject{background:var(--red-wash);border-color:var(--red-wash);color:var(--red-ink)}
  .btn.quiet{background:none;border:0;color:var(--faint);font-weight:500;text-decoration:underline;
    min-height:auto;padding:6px 4px}
  .btn:disabled{opacity:0.6;cursor:default}

  /* login card */
  .login{padding:28px 20px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:18px}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  input,select,textarea{width:100%;font:inherit;font-size:15px;color:var(--ink);
    background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:11px 12px;min-height:44px}
  textarea{min-height:72px;resize:vertical}
  .login .btn.primary{width:100%;margin-top:12px}

  /* queue cards */
  .feed{padding:8px 20px}
  .ecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);
    padding:14px 16px;margin-bottom:12px}
  .venue{font-size:16px;font-weight:600;color:var(--red-ink);margin:0}
  .etitle{font-size:15px;font-weight:500;color:var(--ink);margin:2px 0 0}
  .meta{font-size:13px;color:var(--muted);margin:8px 0 0}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .tag{font-size:11px;font-weight:600;letter-spacing:0.02em;padding:2px 8px;border-radius:var(--r-tag);
    background:var(--surface);border:1px solid var(--line);color:var(--muted)}
  .tag.free{background:var(--free-bg);border-color:var(--free-bg);color:var(--free-ink)}
  .tag.ticket{background:var(--ticket-bg);border-color:var(--ticket-bg);color:var(--ticket-ink)}
  .tag.src{background:var(--review-bg);border-color:var(--review-bg);color:var(--review-ink)}
  .desc{font-size:13px;line-height:1.45;color:var(--ink);margin:10px 0 0;white-space:pre-wrap}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;align-items:center}
  .cardnote{font-size:12px;color:var(--muted);margin-top:8px;min-height:1em}

  /* inline editor */
  .edit{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}
  .edit .field{margin-bottom:10px}
  .edit .row{display:flex;gap:8px}
  .edit .row .field{flex:1}

  /* toast */
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:20;
    background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:10px 16px;
    border-radius:999px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:420px}
  .toast.show{opacity:0.95}

  a:focus-visible,button:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible{
    outline:2px solid var(--brand-red);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark-sub">Montauk - The App</div>
    <h1 class="h1">Admin</h1>
  </header>
  <div id="tabbar"></div>
  <div id="app"><div class="msg">Loading...</div></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://gzhrxycyfekmrobrhoxt.supabase.co";
const SUPABASE_KEY = "sb_publishable_hoqIkzE49xN73b4F6uxo4A_ZsCfVyRX";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TZ = "America/New_York";
const CATEGORY = {live_music:"Live music",food_drink:"Food & drink",arts_culture:"Arts & culture",
  civic:"Civic",kids_family:"Kids & family",outdoors:"Outdoors",nightlife:"Nightlife",
  market:"Market",sports_fishing:"Sports & fishing"};
const COST = {free:"Free",no_cover:"No cover",ticketed:"Ticketed",paid:"Paid"};
const AUDIENCE = {family_friendly:"Kids & Family",adult:"Adult"};
const VILLAGE = {montauk:"Montauk",amagansett:"Amagansett",east_hampton:"East Hampton",
  springs:"Springs",wainscott:"Wainscott",sag_harbor:"Sag Harbor",other:"East End"};

/* --------------------------------------------------------------------------
   Timezone helper (duplicated from submit.html so this file stays standalone).
   Wall-clock Eastern in, correct UTC instant out. Uses the real America/New_York
   offset for the given date, so EDT and EST are both handled. No hardcoded offset.
   -------------------------------------------------------------------------- */
function etOffsetMinutes(y,m,d,hh,mi){
  const asUTC = Date.UTC(y, m-1, d, hh, mi);
  const fmt = new Intl.DateTimeFormat("en-US",{timeZone:TZ,year:"numeric",month:"2-digit",
    day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
  const p = {};
  for(const part of fmt.formatToParts(asUTC)) p[part.type] = part.value;
  let hour = parseInt(p.hour,10); if(hour===24) hour=0;
  const asET = Date.UTC(parseInt(p.year,10), parseInt(p.month,10)-1,
    parseInt(p.day,10), hour, parseInt(p.minute,10));
  return (asET - asUTC) / 60000;
}
function etToISO(dateStr, timeStr){
  if(!dateStr || !timeStr) return null;
  const [y,m,d] = dateStr.split("-").map(Number);
  const [hh,mi] = timeStr.split(":").map(Number);
  const off = etOffsetMinutes(y,m,d,hh,mi);
  const utcMs = Date.UTC(y, m-1, d, hh, mi) - off*60000;
  return new Date(utcMs).toISOString();
}
function timeOfDay(hh){
  if(hh < 17) return "daytime";
  if(hh < 22) return "evening";
  return "late_night";
}
// ISO instant -> {date:"YYYY-MM-DD", time:"HH:MM"} in ET, for edit inputs
function isoToET(iso){
  if(!iso) return {date:"", time:""};
  const d = new Date(iso);
  const parts = {};
  for(const p of new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",
    day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false}).formatToParts(d)) parts[p.type]=p.value;
  let hh = parts.hour; if(hh==="24") hh="00";
  return {date:`${parts.year}-${parts.month}-${parts.day}`, time:`${hh}:${parts.minute}`};
}
function fmtWhen(iso){
  return new Intl.DateTimeFormat("en-US",{timeZone:TZ,weekday:"short",month:"short",
    day:"numeric",hour:"numeric",minute:"2-digit"}).format(new Date(iso));
}
function costClass(cost){
  if(cost==="free"||cost==="no_cover") return "free";
  if(cost==="ticketed"||cost==="paid") return "ticket";
  return "";
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

const DOW_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]; // 0=Sun..6=Sat
// "HH:MM:SS" or "HH:MM" -> "6:00 PM"
function fmtTimeOfDayLabel(t){
  if(!t) return "";
  const [hh,mi] = t.split(":").map(Number);
  const ap = hh < 12 ? "AM" : "PM";
  let h12 = hh % 12; if(h12===0) h12 = 12;
  return `${h12}:${String(mi).padStart(2,"0")} ${ap}`;
}
// "YYYY-MM-DD" -> "Jul 6" (plain calendar date, no timezone math)
function fmtCalDate(dateStr){
  if(!dateStr) return "";
  const [y,m,d] = dateStr.split("-").map(Number);
  const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${MON[m-1]} ${d}`;
}
// local date -> "YYYY-MM-DD" (no timezone shift; uses the date's own y/m/d)
function ymd(y,m,d){ return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
// today's calendar date in ET as {y,m,d}
function todayET(){
  const parts = {};
  for(const p of new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",
    day:"2-digit"}).formatToParts(new Date())) parts[p.type]=p.value;
  return {y:+parts.year, m:+parts.month, d:+parts.day};
}
// start-of-today ET as an ISO instant, for the "Published" query lower bound
function startOfTodayET_ISO(){
  const {y,m,d} = todayET();
  return etToISO(ymd(y,m,d), "00:00");
}

const app = document.getElementById("app");
let TOAST_T;
function toast(text){
  const t = document.getElementById("toast");
  t.textContent = text; t.classList.add("show");
  clearTimeout(TOAST_T);
  TOAST_T = setTimeout(()=>t.classList.remove("show"), 2400);
}

/* ---------- auth ---------- */
async function signOut(){ await db.auth.signOut(); }

function renderLogin(sent){
  if(sent){
    app.innerHTML = `<div class="login"><div class="card">
      <p style="margin:0;font-size:15px;line-height:1.5">Check your email for a login link. Open it on this device to sign in.</p>
    </div></div>`;
    return;
  }
  app.innerHTML = `<div class="login"><div class="card">
    <label for="email">Admin email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email">
    <button class="btn primary" id="sendLink">Send me a login link</button>
    <div class="cardnote" id="loginNote"></div>
  </div></div>`;
  document.getElementById("sendLink").onclick = async ()=>{
    const email = document.getElementById("email").value.trim();
    const note = document.getElementById("loginNote");
    if(!email){ note.textContent = "Enter your email."; return; }
    const btn = document.getElementById("sendLink");
    btn.disabled = true; note.textContent = "Sending...";
    const {error} = await db.auth.signInWithOtp({
      email, options:{ emailRedirectTo: window.location.href.split("#")[0] }
    });
    btn.disabled = false;
    if(error){ note.textContent = "Couldn't send link: " + error.message; return; }
    renderLogin(true);
  };
}

/* ==========================================================================
   Tab controller. Three views share the same feed area and card machinery.
   Each tab knows how to load its rows and how to render its actions.
   ========================================================================== */
const ROWS = {};                 // event/rule id -> latest row, for edit prefill
const COUNTS = {review:null, series:null, published:null};
let ACTIVE_TAB = "review";
const TAB_LABEL = {review:"Review", series:"Series", published:"Published"};

function renderTabs(){
  const bar = document.getElementById("tabbar");
  if(!SIGNED_IN){ bar.innerHTML = ""; return; }
  bar.innerHTML = `<div class="tabs" role="tablist">` +
    ["review","series","published"].map(t=>{
      const c = COUNTS[t];
      const n = c===null ? "" : `<span class="n">${c}</span>`;
      return `<button class="tab" role="tab" data-tab="${t}"
        aria-selected="${t===ACTIVE_TAB}">${TAB_LABEL[t]}${n}</button>`;
    }).join("") + `</div>`;
  bar.querySelectorAll(".tab").forEach(b=>{
    b.onclick = ()=>{ if(b.dataset.tab!==ACTIVE_TAB){ ACTIVE_TAB = b.dataset.tab; renderTabs(); loadActive(); } };
  });
}
function setCount(tab, n){ COUNTS[tab] = n; renderTabs(); }

function topbar(label){
  return `<div class="topbar">
    <span class="count">${label}</span>
    <button class="btn quiet" id="signout">Sign out</button>
  </div>`;
}
function wireSignout(){ const b = document.getElementById("signout"); if(b) b.onclick = signOut; }

function loadActive(){
  if(ACTIVE_TAB==="review") return loadReview();
  if(ACTIVE_TAB==="series") return loadSeries();
  if(ACTIVE_TAB==="published") return loadPublished();
}

// RLS denies non-admins. Show one clear, non-technical message.
function showNotAdmin(){
  SIGNED_IN = false; renderTabs();
  app.innerHTML = `<div class="msg">This account is not an admin.<br>
    <button class="btn quiet" id="so">Sign out</button></div>`;
  document.getElementById("so").onclick = signOut;
}

/* ---------- shared card helpers ---------- */
function setNote(card, text){ const n = card.querySelector(".cardnote"); if(n) n.textContent = text || ""; }
function disableCard(card, on){ card.querySelectorAll("button").forEach(b=>b.disabled=on); }

function optionList(map, selected){
  return Object.entries(map).map(([v,l])=>
    `<option value="${v}"${v===selected?" selected":""}>${l}</option>`).join("");
}

// Remove a card, drop the tab count by one, show empty state if the feed clears.
function removeCard(card, verb, emptyMsg){
  if(verb) toast(verb);
  card.remove();
  const c = COUNTS[ACTIVE_TAB];
  if(typeof c === "number") setCount(ACTIVE_TAB, Math.max(0, c-1));
  const remaining = app.querySelectorAll(".ecard").length;
  const count = app.querySelector(".count");
  if(count && typeof COUNTS[ACTIVE_TAB] === "number") count.textContent = countLabel(ACTIVE_TAB, COUNTS[ACTIVE_TAB]);
  if(remaining===0){
    const feed = app.querySelector(".feed");
    if(feed) feed.innerHTML = `<div class="msg">${emptyMsg||"Nothing here."}</div>`;
  }
}

function countLabel(tab, n){
  if(tab==="review") return `${n} awaiting review`;
  if(tab==="series") return `${n} proposed ${n===1?"series":"series"}`;
  return `${n} published upcoming`;
}

/* ==========================================================================
   VIEW 1 — Review: needs_review one-offs (the existing queue).
   ========================================================================== */
async function loadReview(){
  app.innerHTML = `<div class="msg">Loading the queue...</div>`;
  const {data,error} = await db.from("events")
    .select("*, venues(name)")
    .eq("status","needs_review")
    .order("starts_at");
  if(error){ showNotAdmin(); return; }
  const rows = data||[];
  setCount("review", rows.length);
  renderEventList(rows, "review", "Nothing waiting. The queue is clear.");
}

/* ==========================================================================
   VIEW 3 — Published: live upcoming events, for fixes and cancellations.
   ========================================================================== */
async function loadPublished(){
  app.innerHTML = `<div class="msg">Loading published events...</div>`;
  const {data,error} = await db.from("events")
    .select("*, venues(name)")
    .eq("status","published")
    .gte("starts_at", startOfTodayET_ISO())
    .order("starts_at");
  if(error){ showNotAdmin(); return; }
  const rows = data||[];
  setCount("published", rows.length);
  renderEventList(rows, "published", "No published events coming up.");
}

// Shared event-list renderer for Review and Published. `mode` picks the actions.
function renderEventList(rows, mode, emptyMsg){
  const header = topbar(countLabel(mode, rows.length));
  if(!rows.length){
    app.innerHTML = header + `<div class="msg">${emptyMsg}</div>`;
    wireSignout(); return;
  }
  let html = header + `<div class="feed">`;
  rows.forEach(e=>{
    ROWS[e.id] = e;
    const venue = e.venues && e.venues.name ? esc(e.venues.name) : "No venue";
    const actions = mode==="review"
      ? `<button class="btn approve" data-act="approve">Approve</button>
         <button class="btn reject" data-act="reject">Reject</button>
         <button class="btn" data-act="edit">Edit</button>
         <button class="btn quiet" data-act="delete">Delete</button>`
      : `<button class="btn" data-act="edit">Edit</button>
         <button class="btn reject" data-act="unpublish">Unpublish</button>
         <button class="btn reject" data-act="cancel">Cancel</button>
         <button class="btn quiet" data-act="delete">Delete</button>`;
    html += `<div class="ecard" data-id="${e.id}">
      <div class="view">
        <p class="venue">${venue}</p>
        <p class="etitle">${esc(e.title)}</p>
        <p class="meta">${esc(fmtWhen(e.starts_at))} &middot; ${VILLAGE[e.village]||esc(e.village)}</p>
        <div class="tags">
          <span class="tag">${CATEGORY[e.category]||esc(e.category)}</span>
          <span class="tag ${costClass(e.cost)}">${COST[e.cost]||esc(e.cost)}</span>
          <span class="tag">${AUDIENCE[e.audience]||esc(e.audience)}</span>
          <span class="tag src">${esc(e.source)}</span>
        </div>
        ${e.description ? `<p class="desc">${esc(e.description)}</p>` : ""}
        <div class="actions">${actions}</div>
        <div class="cardnote"></div>
      </div>
    </div>`;
  });
  html += `</div>`;
  app.innerHTML = html;
  wireSignout();

  app.querySelectorAll(".ecard").forEach(card=>{
    card.querySelector(".actions").addEventListener("click", ev=>{
      const b = ev.target.closest("button[data-act]"); if(!b) return;
      handleEventAction(card, b.dataset.act, mode);
    });
  });
}

function handleEventAction(card, act, mode){
  const id = card.dataset.id;
  if(act==="approve")   return updateEventStatus(card, id, "published", "Published", "Nothing waiting. The queue is clear.");
  if(act==="reject")    return updateEventStatus(card, id, "rejected", "Rejected", "Nothing waiting. The queue is clear.");
  if(act==="unpublish") return updateEventStatus(card, id, "needs_review", "Sent back to review", "No published events coming up.");
  if(act==="cancel")    return updateEventStatus(card, id, "archived", "Cancelled", "No published events coming up.");
  if(act==="edit")      return openEventEditor(card, id, mode);
  if(act==="delete")    return doDeleteEvent(card, id, mode);
}

async function updateEventStatus(card, id, status, verb, emptyMsg){
  disableCard(card, true); setNote(card, "Saving...");
  const {error} = await db.from("events").update({status}).eq("id", id);
  if(error){ disableCard(card,false); setNote(card, "Error: " + error.message); return; }
  // Sending an event to review/published/archived changes another tab's count too.
  bumpOtherCount(status);
  removeCard(card, verb, emptyMsg);
}

// When status changes, the destination tab's cached count is now stale.
function bumpOtherCount(status){
  if(status==="needs_review" && typeof COUNTS.review==="number") setCount("review", COUNTS.review+1);
  if(status==="published" && typeof COUNTS.published==="number") setCount("published", COUNTS.published+1);
}

async function doDeleteEvent(card, id, mode){
  if(!confirm("Delete this event for good? This can't be undone.")) return;
  const emptyMsg = mode==="review" ? "Nothing waiting. The queue is clear." : "No published events coming up.";
  disableCard(card, true); setNote(card, "Deleting...");
  const {error} = await db.from("events").delete().eq("id", id);
  if(error){ disableCard(card,false); setNote(card, "Error: " + error.message); return; }
  removeCard(card, "Deleted", emptyMsg);
}

function openEventEditor(card, id, mode){
  const e = ROWS[id];
  const {date, time} = isoToET(e.starts_at);
  const view = card.querySelector(".view");
  view.style.display = "none";
  const ed = document.createElement("div");
  ed.className = "edit";
  ed.innerHTML = `
    <div class="field"><label>Title</label>
      <input class="e-title" type="text" value="${esc(e.title)}" maxlength="140"></div>
    <div class="row">
      <div class="field"><label>Date</label><input class="e-date" type="date" value="${date}"></div>
      <div class="field"><label>Start</label><input class="e-time" type="time" value="${time}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Category</label>
        <select class="e-category">${optionList(CATEGORY, e.category)}</select></div>
      <div class="field"><label>Cost</label>
        <select class="e-cost">${optionList(COST, e.cost)}</select></div>
    </div>
    <div class="field"><label>Audience</label>
      <select class="e-audience">${optionList(AUDIENCE, e.audience)}</select></div>
    <div class="field"><label>Description</label>
      <textarea class="e-desc" maxlength="800">${esc(e.description||"")}</textarea></div>
    <div class="actions">
      <button class="btn primary" data-ed="save">Save</button>
      <button class="btn" data-ed="cancel">Cancel</button>
    </div>
    <div class="cardnote"></div>`;
  card.appendChild(ed);
  ed.querySelector('[data-ed="cancel"]').onclick = ()=>{ ed.remove(); view.style.display=""; };
  ed.querySelector('[data-ed="save"]').onclick = ()=>saveEventEdit(card, id, ed, view);
}

async function saveEventEdit(card, id, ed, view){
  const title = ed.querySelector(".e-title").value.trim();
  const dateStr = ed.querySelector(".e-date").value;
  const timeStr = ed.querySelector(".e-time").value;
  const category = ed.querySelector(".e-category").value;
  const cost = ed.querySelector(".e-cost").value;
  const audience = ed.querySelector(".e-audience").value;
  const description = ed.querySelector(".e-desc").value.trim();
  const note = ed.querySelector(".cardnote");

  if(!title || !dateStr || !timeStr){ note.textContent = "Title, date and start are required."; return; }

  const starts_at = etToISO(dateStr, timeStr);
  const [hh] = timeStr.split(":").map(Number);
  const patch = {title, starts_at, time_of_day:timeOfDay(hh), category, cost, audience,
    description: description || null};

  ed.querySelectorAll("button").forEach(b=>b.disabled=true);
  note.textContent = "Saving...";
  const {data,error} = await db.from("events").update(patch).eq("id", id)
    .select("*, venues(name)").single();
  if(error){ ed.querySelectorAll("button").forEach(b=>b.disabled=false);
    note.textContent = "Error: " + error.message; return; }

  ROWS[id] = data;
  ed.remove();
  view.querySelector(".venue").textContent = data.venues && data.venues.name ? data.venues.name : "No venue";
  view.querySelector(".etitle").textContent = data.title;
  view.querySelector(".meta").innerHTML = `${esc(fmtWhen(data.starts_at))} &middot; ${VILLAGE[data.village]||esc(data.village)}`;
  view.querySelector(".tags").innerHTML =
    `<span class="tag">${CATEGORY[data.category]||esc(data.category)}</span>
     <span class="tag ${costClass(data.cost)}">${COST[data.cost]||esc(data.cost)}</span>
     <span class="tag">${AUDIENCE[data.audience]||esc(data.audience)}</span>
     <span class="tag src">${esc(data.source)}</span>`;
  let descEl = view.querySelector(".desc");
  if(data.description){
    if(!descEl){ descEl = document.createElement("p"); descEl.className="desc";
      view.querySelector(".tags").after(descEl); }
    descEl.textContent = data.description;
  } else if(descEl){ descEl.remove(); }
  view.style.display = "";
  toast("Saved");
}

/* ==========================================================================
   VIEW 2 — Series: proposed recurring rules from the scout.
   ========================================================================== */
async function loadSeries(){
  app.innerHTML = `<div class="msg">Loading proposed series...</div>`;
  const {data,error} = await db.from("recurring_rules")
    .select("*, venues(name)")
    .eq("source","press_scout")
    .eq("active", false)
    .order("season_start");
  if(error){ showNotAdmin(); return; }
  const rows = data||[];
  setCount("series", rows.length);
  renderSeries(rows);
}

function seasonRange(rule){
  const a = fmtCalDate(rule.season_start);
  const b = fmtCalDate(rule.season_end);
  if(a && b) return `${a} - ${b}`;
  return a || b || "";
}
function daysLabel(days){
  if(!Array.isArray(days) || !days.length) return "";
  return days.slice().sort((x,y)=>x-y).map(d=>DOW_SHORT[d]).join("/");
}

function renderSeries(rows){
  const header = topbar(countLabel("series", rows.length));
  if(!rows.length){
    app.innerHTML = header + `<div class="msg">No proposed series to review.</div>`;
    wireSignout(); return;
  }
  let html = header + `<div class="feed">`;
  rows.forEach(r=>{
    ROWS[r.id] = r;
    const venue = r.venues && r.venues.name ? esc(r.venues.name) : "No venue";
    html += `<div class="ecard" data-id="${r.id}">
      <div class="view">
        <p class="venue">${venue}</p>
        <p class="etitle">${esc(r.title)}</p>
        <p class="meta">${esc(daysLabel(r.days_of_week))} &middot; ${esc(fmtTimeOfDayLabel(r.start_time))}</p>
        <p class="meta">${esc(seasonRange(r))}</p>
        <div class="tags">
          <span class="tag">${CATEGORY[r.category]||esc(r.category||"")}</span>
          <span class="tag ${costClass(r.cost)}">${COST[r.cost]||esc(r.cost||"")}</span>
          <span class="tag">${AUDIENCE[r.audience]||esc(r.audience||"")}</span>
          <span class="tag src">weekly</span>
        </div>
        <div class="actions">
          <button class="btn approve" data-act="approve">Approve</button>
          <button class="btn reject" data-act="reject">Reject</button>
        </div>
        <div class="cardnote"></div>
      </div>
    </div>`;
  });
  html += `</div>`;
  app.innerHTML = html;
  wireSignout();

  app.querySelectorAll(".ecard").forEach(card=>{
    card.querySelector(".actions").addEventListener("click", ev=>{
      const b = ev.target.closest("button[data-act]"); if(!b) return;
      if(b.dataset.act==="approve") approveSeries(card, card.dataset.id);
      if(b.dataset.act==="reject")  rejectSeries(card, card.dataset.id);
    });
  });
}

async function rejectSeries(card, id){
  if(!confirm("Reject this series? The proposed rule will be deleted. No events are created.")) return;
  disableCard(card, true); setNote(card, "Rejecting...");
  const {error} = await db.from("recurring_rules").delete().eq("id", id);
  if(error){ disableCard(card,false); setNote(card, "Error: " + error.message); return; }
  removeCard(card, "Rejected", "No proposed series to review.");
}

// Approve: activate the rule, then expand it into published events (idempotent).
async function approveSeries(card, id){
  const rule = ROWS[id];
  disableCard(card, true); setNote(card, "Approving...");

  // 1) activate the rule
  const {error:actErr} = await db.from("recurring_rules").update({active:true}).eq("id", id);
  if(actErr){ disableCard(card,false); setNote(card, "Error: " + actErr.message); return; }

  // 2) look up the venue's village
  const {data:venue, error:vErr} = await db.from("venues")
    .select("village").eq("id", rule.venue_id).single();
  if(vErr){ disableCard(card,false); setNote(card, "Error: " + vErr.message); return; }
  const village = venue ? venue.village : null;

  // 3) build candidate dates in [max(today, season_start) .. min(today+8w, season_end)]
  setNote(card, "Expanding dates...");
  const dates = seriesDates(rule);

  if(!dates.length){
    // Rule activated but its window produced nothing (e.g. season already ended).
    removeCard(card, "Approved: no dates in range", "No proposed series to review.");
    return;
  }

  // 4) de-dup against existing recurring_rule events for this rule
  const {data:existing, error:exErr} = await db.from("events")
    .select("source_ref")
    .eq("source","recurring_rule")
    .like("source_ref", `${id}:%`);
  if(exErr){ disableCard(card,false); setNote(card, "Error: " + exErr.message); return; }
  const seen = new Set((existing||[]).map(r=>r.source_ref));

  const [hh] = rule.start_time.split(":").map(Number);
  const startHM = rule.start_time.slice(0,5);              // "HH:MM"
  const endHM = rule.end_time ? rule.end_time.slice(0,5) : null;

  const toInsert = [];
  dates.forEach(dStr=>{
    const source_ref = `${id}:${dStr}`;
    if(seen.has(source_ref)) return;
    toInsert.push({
      venue_id: rule.venue_id,
      title: rule.title,
      starts_at: etToISO(dStr, startHM),
      ends_at: endHM ? etToISO(dStr, endHM) : null,
      village,
      time_of_day: timeOfDay(hh),
      audience: rule.audience,
      category: rule.category,
      cost: rule.cost,
      recurrence: "weekly",
      status: "published",
      source: "recurring_rule",
      source_ref
    });
  });

  if(toInsert.length){
    const {error:insErr} = await db.from("events").insert(toInsert);
    if(insErr){ disableCard(card,false); setNote(card, "Error: " + insErr.message); return; }
    // Newly published events land in the Published tab.
    if(typeof COUNTS.published==="number") setCount("published", COUNTS.published + toInsert.length);
  }

  const n = toInsert.length;
  removeCard(card, `Approved: added ${n} date${n===1?"":"s"}`, "No proposed series to review.");
}

// Compute the list of "YYYY-MM-DD" dates the rule fires on within its clamped window.
function seriesDates(rule){
  const days = new Set((rule.days_of_week||[]).map(Number));
  if(!days.size) return [];

  // window bounds as local Date objects (calendar dates, midnight local)
  const t = todayET();
  const today = new Date(t.y, t.m-1, t.d);
  const eightWeeks = new Date(t.y, t.m-1, t.d + 56); // today + 8 weeks

  const [sy,sm,sd] = rule.season_start.split("-").map(Number);
  const seasonStart = new Date(sy, sm-1, sd);
  const [ey,em,ed] = rule.season_end.split("-").map(Number);
  const seasonEnd = new Date(ey, em-1, ed);

  const start = today > seasonStart ? today : seasonStart;
  const end   = eightWeeks < seasonEnd ? eightWeeks : seasonEnd;

  const out = [];
  const cur = new Date(start);
  while(cur <= end){
    if(days.has(cur.getDay())){ // getDay(): 0=Sun..6=Sat, matches days_of_week convention
      out.push(ymd(cur.getFullYear(), cur.getMonth()+1, cur.getDate()));
    }
    cur.setDate(cur.getDate() + 1);
  }
  return out;
}

/* ---------- session wiring ---------- */
let SIGNED_IN = false;

function route(session){
  if(session){
    SIGNED_IN = true;
    // Reset cached counts on a fresh sign-in so stale numbers never linger.
    COUNTS.review = COUNTS.series = COUNTS.published = null;
    ACTIVE_TAB = "review";
    renderTabs();
    loadActive();
  } else {
    SIGNED_IN = false;
    renderTabs();
    renderLogin(false);
  }
}
// onAuthStateChange fires an INITIAL_SESSION event on subscribe, which covers
// both the returning-from-magic-link case and an existing session. We render
// only from here so the view never loads twice.
let LAST_UID = undefined;
db.auth.onAuthStateChange((_event, session)=>{
  const uid = session ? session.user.id : null;
  if(uid === LAST_UID) return; // ignore token refreshes that don't change who's signed in
  LAST_UID = uid;
  route(session);
});
