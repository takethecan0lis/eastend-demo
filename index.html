<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Montauk - The App</title>
<meta name="description" content="All of the East End events in one place!">
<meta property="og:type" content="website">
<meta property="og:url" content="https://takethecan0lis.github.io/eastend-demo/">
<meta property="og:title" content="Montauk - The App">
<meta property="og:description" content="All of the East End events in one place!">
<meta property="og:image" content="https://takethecan0lis.github.io/eastend-demo/share-card.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Montauk - The App">
<meta name="twitter:description" content="All of the East End events in one place!">
<meta name="twitter:image" content="https://takethecan0lis.github.io/eastend-demo/share-card.png">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* brand */
    --brand-red:#B0342B;
    --red-ink:#9A2B22;
    --red-wash:#F7E7E4;

    /* surfaces + text */
    --bg:#FBFAF7;
    --surface:#FFFFFF;
    --ink:#1F1D1B;
    --muted:#6E685F;
    --faint:#9A948B;
    --line:#E7E2D8;

    /* semantic: cost + status */
    --free-ink:#2F6B34;    --free-bg:#E6F0E1;
    --ticket-ink:#8A5A00;  --ticket-bg:#F6ECD6;
    --review-ink:#7A736A;  --review-bg:#EFEBE3;

    /* radius */
    --r-card:12px; --r-chip:999px; --r-tag:6px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;background:var(--bg);
    padding:0 0 88px;position:relative}
  header{padding:22px 20px 0;text-align:center}
  .wordmark{line-height:1}
  .mark-main{font-family:"Anton",sans-serif;font-size:52px;line-height:0.9;
    letter-spacing:0.01em;text-transform:uppercase;color:var(--brand-red)}
  .mark-sub{font-family:"Anton",sans-serif;font-size:19px;line-height:1;margin-top:5px;
    letter-spacing:0.3em;text-indent:0.3em;text-transform:uppercase;color:var(--brand-red)}
  .tagline{margin:14px 0 16px;font-family:"Oswald",sans-serif;font-weight:500;
    font-size:15px;letter-spacing:0.04em;text-transform:uppercase;color:var(--red-ink)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;
    position:sticky;top:0;background:var(--bg);z-index:5;
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  select.chip{appearance:none;font:inherit}
  .chip{font-size:13px;font-weight:500;padding:8px 14px;min-height:44px;
    display:inline-flex;align-items:center;border-radius:var(--r-chip);
    border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--red-wash);border-color:var(--red-wash);color:var(--red-ink);font-weight:600}
  .daygroup{padding:0 20px}
  .dayhdr{font-family:"Oswald",sans-serif;font-size:15px;font-weight:600;
    letter-spacing:0.06em;text-transform:uppercase;color:var(--ink);margin:20px 0 10px}
  .card{display:flex;gap:14px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-card);padding:13px 15px;margin-bottom:10px}
  .when{min-width:62px}
  .time{font-size:16px;font-weight:600;margin:0;color:var(--ink)}
  .vill{font-size:11px;font-weight:500;color:var(--muted);margin:2px 0 0}
  .body{flex:1;min-width:0}
  .venue{font-size:16px;font-weight:600;letter-spacing:-0.01em;color:var(--red-ink);margin:0}
  .venue.novenue{color:var(--ink)}
  .title{font-size:14px;line-height:1.35;color:var(--ink);margin:2px 0 0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .tag{font-size:11px;font-weight:600;letter-spacing:0.02em;padding:2px 8px;border-radius:var(--r-tag);
    background:var(--surface);border:1px solid var(--line);color:var(--muted)}
  .tag.free{background:var(--free-bg);border-color:var(--free-bg);color:var(--free-ink)}
  .tag.ticket{background:var(--ticket-bg);border-color:var(--ticket-bg);color:var(--ticket-ink)}
  .tag.review{background:var(--review-bg);border-color:var(--review-bg);color:var(--review-ink)}
  .msg{padding:40px 20px;text-align:center;color:var(--muted);font-size:15px}
  .linkbtn{border:0;background:none;color:var(--red-ink);font:inherit;font-weight:600;
    cursor:pointer;margin-top:10px;padding:8px;text-decoration:underline}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;
    max-width:460px;display:flex;background:var(--surface);border-top:1px solid var(--line)}
  .tab{flex:1;text-align:center;padding:10px 0;min-height:56px;font-size:11px;
    font-weight:500;color:var(--muted);position:relative}
  .tab.on{color:var(--brand-red)}
  .tab.on::before{content:"";position:absolute;top:-1px;left:0;right:0;height:2px;background:var(--brand-red)}
  .tab .ic{display:block;font-size:18px;line-height:1.4}
  a:focus-visible,button:focus-visible,select:focus-visible{
    outline:2px solid var(--brand-red);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="wordmark">
      <div class="mark-main">Montauk</div>
      <div class="mark-sub">The App</div>
    </div>
    <p class="tagline">All of the East End events in one place!</p>
  </header>
  <div class="filters" id="filters">
    <select class="chip" id="villageSel"><option value="">All villages</option></select>
    <button class="chip on" data-grp="part" data-val="">Any time</button>
    <button class="chip" data-grp="part" data-val="daytime">Daytime</button>
    <button class="chip" data-grp="part" data-val="evening">Evening</button>
    <button class="chip on" data-grp="aud" data-val="">All</button>
    <button class="chip" data-grp="aud" data-val="family_friendly">Kids &amp; Family</button>
    <button class="chip" data-grp="aud" data-val="adult">Adult</button>
  </div>
  <div id="feed"><div class="msg">Loading what's on…</div></div>
  <div class="tabbar">
    <div class="tab on"><span class="ic">◴</span>This week</div>
    <div class="tab"><span class="ic">▦</span>Calendar</div>
    <div class="tab"><span class="ic">◎</span>Map</div>
    <div class="tab"><span class="ic">♡</span>Saved</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://gzhrxycyfekmrobrhoxt.supabase.co";
const SUPABASE_KEY = "sb_publishable_hoqIkzE49xN73b4F6uxo4A_ZsCfVyRX";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TZ = "America/New_York";
const VILLAGE = {montauk:"Montauk",amagansett:"Amagansett",east_hampton:"East Hampton",
  springs:"Springs",wainscott:"Wainscott",sag_harbor:"Sag Harbor",other:"East End"};
const CATEGORY = {live_music:"Live music",food_drink:"Food & drink",arts_culture:"Arts & culture",
  civic:"Civic",kids_family:"Kids & family",outdoors:"Outdoors",nightlife:"Nightlife",
  market:"Market",sports_fishing:"Sports & fishing"};
const COST = {free:"Free",no_cover:"No cover",ticketed:"Ticketed",paid:"$$"};

// Some venues (e.g. Guild Hall) publish titles in ALL CAPS. Soften those for
// display only; the database keeps the source text faithfully.
const SMALL_WORDS = new Set(["a","an","and","the","of","or","for","to","in","on","at","with","by","vs","from","as","w/"]);
const ACRONYMS = new Set(["NY","NYC","DJ","UN","USA","UK","US","EDM","LI","VIP","BBQ","AM","PM","RSVP","MTK"]);
function smartTitle(str){
  str = str||"";
  // Only reformat titles that are essentially all-caps AND multi-word.
  // Single-word all-caps (BAILEN, JOHNNYSWIM) are likely stylized names — leave them.
  if(!/[A-Z]/.test(str) || /[a-z]/.test(str) || !/\s/.test(str)) return str;
  let afterBreak = true; // start of string, or just after a colon
  return str.toLowerCase().split(/(\s+|\/|-|:)/).map(tok=>{
    if(tok==="" || /^\s+$/.test(tok) || tok==="/" || tok==="-") return tok; // separators
    if(tok===":"){ afterBreak = true; return tok; }
    const up = tok.toUpperCase();
    let out;
    if(ACRONYMS.has(up)) out = up;
    else if(!afterBreak && SMALL_WORDS.has(tok)) out = tok;
    else out = tok.charAt(0).toUpperCase()+tok.slice(1);
    afterBreak = false;
    return out;
  }).join("");
}

let ALL = [];
const filters = {village:"", part:"", aud:""};

function etParts(d){
  const p = new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",
    day:"2-digit",weekday:"short",month:"short"}).formatToParts(d);
  const get = t => p.find(x=>x.type===t)?.value;
  return {key:`${get("year")}-${getNum(p,"month")}-${getNum(p,"day")}`, d};
}
function getNum(parts,t){ // robust 2-digit from en-CA numeric
  return new Intl.DateTimeFormat("en-CA",{timeZone:TZ,[t]:"2-digit"}).format();
}
function dayKey(date){
  return new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"}).format(date);
}
function dayLabel(date){
  const today = dayKey(new Date());
  const tom = dayKey(new Date(Date.now()+86400000));
  const k = dayKey(date);
  if(k===today) return "Today";
  if(k===tom) return "Tomorrow";
  return new Intl.DateTimeFormat("en-US",{timeZone:TZ,weekday:"long",month:"short",day:"numeric"}).format(date);
}
function timeLabel(date){
  return new Intl.DateTimeFormat("en-US",{timeZone:TZ,hour:"numeric",minute:"2-digit"}).format(date);
}

async function load(){
  const {data,error} = await db.from("published_upcoming").select("*").order("starts_at").limit(300);
  const feed = document.getElementById("feed");
  if(error){ feed.innerHTML = `<div class="msg">Couldn't load events.<br>${error.message}</div>`; return; }
  ALL = (data||[]).map(e=>({...e, _d:new Date(e.starts_at)}));
  // populate village filter from data
  const sel = document.getElementById("villageSel");
  [...new Set(ALL.map(e=>e.village))].sort().forEach(v=>{
    const o=document.createElement("option"); o.value=v; o.textContent=VILLAGE[v]||v; sel.appendChild(o);
  });
  render();
}

function costClassFor(cost){
  if(cost==="free"||cost==="no_cover") return "free";
  if(cost==="ticketed"||cost==="paid") return "ticket";
  return "";
}

function clearFilters(){
  filters.village = filters.part = filters.aud = "";
  document.getElementById("villageSel").value = "";
  document.querySelectorAll("button.chip").forEach(x=>x.classList.toggle("on", x.dataset.val===""));
  render();
}

function render(){
  const feed = document.getElementById("feed");
  // Show the whole current day (even events already started/ended), roll over at ET midnight.
  const todayKey = dayKey(new Date());
  let rows = ALL.filter(e=>dayKey(e._d)>=todayKey)
    .filter(e=>!filters.village || e.village===filters.village)
    .filter(e=>!filters.part || e.time_of_day===filters.part)
    .filter(e=>!filters.aud || e.audience===filters.aud);

  if(!rows.length){
    feed.innerHTML = `<div class="msg">Nothing matches those filters yet.<br>
      <button class="linkbtn" id="clearF">Clear filters</button></div>`;
    const cf = document.getElementById("clearF"); if(cf) cf.onclick = clearFilters;
    return;
  }

  const groups = {};
  rows.forEach(e=>{ const k=dayKey(e._d); (groups[k] ||= {label:dayLabel(e._d),items:[]}).items.push(e); });

  let html = "";
  Object.keys(groups).sort().forEach(k=>{
    const g = groups[k];
    html += `<div class="daygroup"><div class="dayhdr">${g.label}</div>`;
    g.items.forEach(e=>{
      const title = esc(smartTitle(e.title));
      html += `<div class="card">
        <div class="when"><p class="time">${timeLabel(e._d)}</p>
          <p class="vill">${VILLAGE[e.village]||e.village}</p></div>
        <div class="body">
          ${e.venue_name
            ? `<p class="venue">${esc(e.venue_name)}</p><p class="title">${title}</p>`
            : `<p class="venue novenue">${title}</p>`}
          <div class="tags">
            <span class="tag">${CATEGORY[e.category]||e.category}</span>
            <span class="tag ${costClassFor(e.cost)}">${COST[e.cost]||e.cost}</span>
            ${e.audience==="adult"?`<span class="tag">Adult</span>`:""}
          </div>
        </div></div>`;
    });
    html += `</div>`;
  });
  feed.innerHTML = html;
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

document.getElementById("filters").addEventListener("click",ev=>{
  const b = ev.target.closest("button.chip"); if(!b) return;
  const grp = b.dataset.grp;
  filters[grp] = b.dataset.val;
  document.querySelectorAll(`button.chip[data-grp="${grp}"]`).forEach(x=>x.classList.toggle("on",x===b));
  render();
});
document.getElementById("villageSel").addEventListener("change",e=>{
  filters.village = e.target.value; render();
});

load();
</script>
</body>
</html>
